<!-- ==========================================================
     Semana 3 - usuarios-lista.html
     Vista principal para mostrar la lista de usuarios
     ========================================================== -->

<!-- Encabezado principal -->
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="fw-bold text-primary mb-0">
    <i class="bi bi-people-fill me-2"></i> Lista de Usuarios RVR
  </h2>

  <div>
    <!-- Botón Back -->
    <a class="btn btn-secondary shadow-sm me-2" [routerLink]="['/']">
      <i class="bi bi-arrow-left-circle me-1"></i> Back
    </a>

    <!-- Botón destacado -->
    <a class="btn btn-success shadow-sm" [routerLink]="['/agregar']">
      <i class="bi bi-person-plus-fill me-1"></i> Agregar Usuario
    </a>
  </div>
</div>

<!-- Mensaje cuando no existen usuarios -->
<div class="alert alert-warning text-center" *ngIf="usuarios.length === 0">
  <i class="bi bi-info-circle me-2"></i> No hay usuarios disponibles.
</div>

<!-- Tabla de usuarios -->
<div class="card border-0 shadow-lg" *ngIf="usuarios.length > 0">
  <div class="card-header bg-primary text-white fw-semibold">
    <i class="bi bi-list-check me-2"></i> Usuarios Registrados
  </div>
  <div class="card-body">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        
        <!-- Cabecera -->
        <thead class="table-light">
          <tr>
            <th scope="col">#</th>
            <th scope="col">Nombre</th>
            <th scope="col">Correo</th>
            <th scope="col">Rol</th>
            <th scope="col">Fecha de Registro</th>
            <th scope="col" class="text-center">Acciones</th>
          </tr>
        </thead>

        <!-- Cuerpo -->
        <tbody>
          <tr *ngFor="let usuario of usuarios; let i = index">
            <td>{{ i + 1 }}</td>
            <td class="fw-semibold">{{ usuario.nombre }}</td>
            <td><span class="text-muted">{{ usuario.email }}</span></td>
            <td>
              <span class="badge bg-info text-dark">{{ usuario.rol }}</span>
            </td>
            <td>{{ usuario.fecha}}</td>

            <!-- Acciones -->
            <td class="text-center">
              <!-- Ver usuario -->
              <a class="btn btn-sm btn-outline-info me-2" [routerLink]="['/detalle', usuario.id]">
                <i class="bi bi-eye me-1"></i> V
              </a>

              <!-- Editar usuario -->
              <a class="btn btn-sm btn-outline-warning me-2" [routerLink]="['/editar', usuario.id]">
                <i class="bi bi-pencil-square me-1"></i> E
              </a>

              <!-- Eliminar usuario -->
              <button class="btn btn-sm btn-outline-danger" type="button" (click)="eliminarUsuario(usuario.id)">
                <i class="bi bi-trash me-1"></i> X
              </button>
            </td>
          </tr>
        </tbody>

      </table>
    </div>
  </div>
</div>
